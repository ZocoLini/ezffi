name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    fmt-clippy-test:
        name: Format, Lint and Unit Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Cache cargo registry and git
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache cargo target dir
              uses: actions/cache@v4
              with:
                  path: target
                  key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

            - name: Install cbindgen
              run: cargo install cbindgen --locked --force

            - name: Check code formatting (rustfmt)
              run: cargo fmt --all -- --check

            - name: Run clippy (fail on warnings)
              run: cargo clippy --all-targets --all-features -- -D warnings

            - name: Run unit tests
              run: cargo test --workspace --jobs 2

    ffi-c-tests:
        name: C integration tests (ffi-c-tests)
        runs-on: ubuntu-latest
        needs: fmt-clippy-test
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install build dependencies
              run: sudo apt-get update && sudo apt-get install -y build-essential gcc

            - name: Install cbindgen
              run: cargo install cbindgen --locked --force

            - name: Build workspace artifacts
              run: cargo build --workspace --verbose

            - name: Run ffi-c-tests script
              working-directory: crates/ffi-c-tests
              run: |
                  chmod +x test.sh
                  ./test.sh
